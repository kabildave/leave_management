{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="card-title mb-3"><i class="bi bi-pencil-square"></i> Apply for Leave</h4>
                
                <div class="alert alert-info">
                    <i class="bi bi-person-circle"></i> Applying as: <strong>{{ session.get('user_name', 'User') }}</strong>
                </div>
                
                <form method="POST" action="{{ url_for('apply_leave') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" name="name" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="form-text">This will appear on your leave request.</div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">From Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                <input type="date" class="form-control" name="from_date" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">To Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                <input type="date" class="form-control" name="to_date" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Reason</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-chat"></i></span>
                            <textarea class="form-control" name="reason" rows="3" placeholder="Brief reason for leave..." required></textarea>
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-apply px-5">
                            <i class="bi bi-send"></i> Apply
                        </button>
                    </div>
                </form>
                <hr class="mt-4">
                <div class="row text-muted small">
                    <div class="col-md-6">
                        <i class="bi bi-info-circle"></i> After applying, you'll see your leave in the <strong>"My Leaves"</strong> list.
                    </div>
                    <div class="col-md-6 text-md-end">
                        <i class="bi bi-clock-history"></i> Status updates in real-time
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
